name: "🚀 기능 구현 (Tasklist)"
description: 새로운 기능을 정의하고 작업 리스트를 작성합니다.
title: "[Feature]: "
labels: ["enhancement", "feature"]
body:
  - type: textarea
    id: overview
    attributes:
      label: 어떤 기능인가요?
      description: 추가하려는 기능에 대해 간결하게 설명해주세요.
      placeholder: "예: 피드 생성 및 조회를 위한 REST API를 구현합니다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 상세 내용
      description: 마크다운 체크박스 형식으로 작업 리스트를 적어주세요.
      value: |
        - [ ]
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고할만한 자료(선택)
      description: API 명세서나 관련 문서 링크가 있다면 첨부해주세요.